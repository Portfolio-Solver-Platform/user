name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_call:

permissions:
  contents: read

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check PR title for Conventional Commits format
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate configuration
    needs: [validate-pr-title]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@32cb6a5ae30bb0dfc996fa7baf8bf1ed28442fa4 # v3.17.3

      - name: Install environment
        run: nix develop .#checks

      - name: Run checks
        run: nix develop .#checks --command pre-commit run -a

  ci:
    needs: [validate, validate-pr-title]
    permissions:
      contents: read
    uses: Portfolio-Solver-Platform/infrastructure/.github/workflows/python-ci.yaml@main
    with:
      code_audit_targets: "./src/"
