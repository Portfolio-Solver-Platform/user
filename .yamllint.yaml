extends: default

rules:
  line-length: disable

  document-start: disable

  truthy:
    allowed-values: ['true', 'false']

  indentation:
    spaces: 2
    indent-sequences: true

  comments:
    require-starting-space: true
    min-spaces-from-content: 1

ignore: |
  .git/
  .github/
  helm/templates/
